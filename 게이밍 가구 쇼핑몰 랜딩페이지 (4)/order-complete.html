<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 완료 · MORESEAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f6f7f9; color:#1c1c1e; font-family:'Pretendard',system-ui,sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  a { text-decoration:none; }
  .card { background:#fff; border:1px solid #eceef1; border-radius:18px; box-shadow:0 24px 60px -30px rgba(0,0,0,.25); max-width:440px; width:100%; padding:44px 36px; text-align:center; }
  .icon { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; font-size:34px; font-weight:800; }
  .ok { background:#e6f7ee; color:#1f8a5b; }
  .fail { background:#fdecec; color:#d64545; }
  h1 { font-size:23px; font-weight:800; letter-spacing:-.02em; }
  p { color:#6b6f76; font-size:15px; margin-top:12px; line-height:1.6; }
  .tid { margin-top:18px; font-size:12.5px; color:#a9adb6; font-family:ui-monospace,monospace; word-break:break-all; }
  .btns { display:flex; gap:10px; margin-top:28px; }
  .btn { flex:1; padding:14px; border-radius:11px; font-size:15px; font-weight:700; cursor:pointer; border:none; }
  .primary { background:#1c1c1e; color:#fff; }
  .ghost { background:#f2f3f5; color:#33353a; }
</style>
</head>
<body>
  <div class="card">
    <div id="icon" class="icon ok">✓</div>
    <h1 id="title">주문이 완료되었습니다</h1>
    <p id="desc">결제가 정상적으로 처리되었습니다. 주문 내역은 이메일로 안내해 드립니다.</p>
    <div id="tid" class="tid"></div>
    <div class="btns">
      <a class="btn ghost" href="게이밍가구 랜딩.dc.html">쇼핑 계속하기</a>
      <a class="btn primary" href="category.dc.html?cat=all">전체 상품 보기</a>
    </div>
  </div>
<script>
  var q = new URLSearchParams(location.search);
  var success = q.get('success');
  var tid = q.get('tid') || '';
  var message = q.get('message') || '';
  var fail = success === 'false';
  if (fail) {
    document.getElementById('icon').className = 'icon fail';
    document.getElementById('icon').textContent = '!';
    document.getElementById('title').textContent = '결제가 완료되지 않았습니다';
    document.getElementById('desc').textContent = message || '결제가 취소되었거나 실패했습니다. 다시 시도해 주세요.';
  } else if (message) {
    document.getElementById('desc').textContent = message;
  }
  if (tid) document.getElementById('tid').textContent = '주문번호: ' + tid;
</script>
</body>
</html>
