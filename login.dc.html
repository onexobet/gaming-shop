<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f6f7f9; color:#1c1c1e; font-family:'Pretendard',system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.6; }
  ::selection { background:#dbe4ff; }
  a { color:inherit; text-decoration:none; }
  button { font-family:inherit; }
  input { font-family:inherit; }
  input:focus { outline:none; border-color:#3a56c5 !important; }
</style>
</helmet>

<div style="min-height:100vh;display:flex;flex-direction:column;">

  <header style="background:#fff;border-bottom:1px solid #ececef;">
    <nav style="max-width:1280px;margin:0 auto;padding:18px 28px;display:flex;align-items:center;">
      <a href="index.html" style="font-weight:800;font-size:25px;letter-spacing:.14em;color:#1c1c1e;">MORESEAT</a>
    </nav>
  </header>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;">
    <div style="width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:28px;">
        <h1 style="font-weight:800;font-size:26px;letter-spacing:-.01em;">로그인</h1>
        <p style="font-size:14px;color:#8a8d94;margin-top:8px;">MORESEAT에 오신 것을 환영합니다</p>
      </div>

      <div style="background:#fff;border:1px solid #eceef1;border-radius:16px;padding:30px;">
        <sc-if value="{{ done }}" hint-placeholder-val="{{ false }}">
          <div style="text-align:center;padding:16px 0;">
            <div style="font-size:18px;font-weight:800;color:#1f8a5b;margin-bottom:8px;">환영합니다, {{ who }}님</div>
            <p style="font-size:14px;color:#55575d;">로그인되었습니다.</p>
            <a href="index.html" style="display:inline-block;margin-top:20px;background:#1c1c1e;color:#fff;font-weight:700;font-size:14px;padding:12px 26px;border-radius:9px;">쇼핑 계속하기</a>
          </div>
        </sc-if>
        <sc-if value="{{ form }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div>
              <label style="display:block;font-size:13px;font-weight:600;color:#55575d;margin-bottom:7px;">이메일</label>
              <input value="{{ email }}" onInput="{{ onEmail }}" type="email" placeholder="you@example.com" style="width:100%;border:1px solid #dcdee3;border-radius:9px;padding:12px 14px;font-size:14px;" />
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:600;color:#55575d;margin-bottom:7px;">비밀번호</label>
              <input value="{{ pw }}" onInput="{{ onPw }}" type="password" placeholder="비밀번호" style="width:100%;border:1px solid #dcdee3;border-radius:9px;padding:12px 14px;font-size:14px;" />
            </div>
            <sc-if value="{{ error }}" hint-placeholder-val="{{ false }}"><div style="font-size:13px;color:#d84040;font-weight:600;">{{ error }}</div></sc-if>
            <button onClick="{{ submit }}" style="background:#1c1c1e;color:#fff;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:10px;cursor:pointer;margin-top:4px;">로그인</button>
          </div>
        </sc-if>
      </div>

      <div style="text-align:center;font-size:14px;color:#8a8d94;margin-top:20px;">
        아직 회원이 아니신가요? <a href="signup.dc.html" style="color:#3a56c5;font-weight:700;">회원가입</a>
      </div>
    </div>
  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: '', pw: '', error: '', done: false };

  redirectTarget() {
    try {
      const r = new URLSearchParams(location.search).get('redirect');
      if (r && /^[a-z0-9_.-]+\.html/i.test(r)) return r;
    } catch (e) {}
    return 'index.html';
  }

  submit() {
    if (!this.state.email.trim() || !this.state.pw.trim()) { this.setState({ error: '이메일과 비밀번호를 입력해주세요.' }); return; }
    if (!/.+@.+\..+/.test(this.state.email)) { this.setState({ error: '올바른 이메일 형식이 아닙니다.' }); return; }
    try {
      localStorage.setItem('ms_user', JSON.stringify({ email: this.state.email, name: this.state.email.split('@')[0], at: Date.now() }));
    } catch (e) {}
    this.setState({ done: true, error: '' });
    const t = this.redirectTarget();
    setTimeout(() => { location.href = t; }, 900);
  }

  renderVals() {
    return {
      email: this.state.email, pw: this.state.pw, error: this.state.error,
      done: this.state.done, form: !this.state.done,
      who: this.state.email.split('@')[0] || '회원',
      onEmail: (e) => this.setState({ email: e.target.value, error: '' }),
      onPw: (e) => this.setState({ pw: e.target.value, error: '' }),
      submit: () => this.submit(),
    };
  }
}
</script>
</body>
</html>
